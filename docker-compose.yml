services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      # Solo lectura: permite correr `docker compose run --rm backend python -m etl.load`
      # sin tener que reconstruir la imagen ni copiar los CSV pesados dentro de ella.
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
